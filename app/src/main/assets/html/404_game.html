<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>抢滩登陆</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #07111f;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Share Tech Mono', monospace;
      color: #c8d8e8;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    :root {
      --ui-bg: rgba(13, 24, 38, 0.9);
      --ui-accent: #e8c84a;
      --ui-border: #1a3040;
    }

    #hdr {
      position: absolute;
      top: env(safe-area-inset-top, 10px);
      left: 10px;
      z-index: 10;
      background: var(--ui-bg);
      backdrop-filter: blur(8px);
      padding: 6px 10px;
      border: 1px solid var(--ui-border);
      border-radius: 6px;
      pointer-events: none;
      margin: 0;
    }

    #wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    /* 顶部统一 HUD 面板 */
    #top-hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: linear-gradient(to bottom, var(--ui-bg), rgba(10, 20, 30, 0.7));
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ui-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 env(safe-area-inset-right, 15px) 0 env(safe-area-inset-left, 15px);
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .hud-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .hud-title h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1em;
      margin: 0;
      color: var(--ui-accent);
      text-shadow: 0 0 10px var(--ui-glow);
    }

    .hud-timer {
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: bold;
      color: #ff5050;
    }

    .hud-stats {
      display: flex;
      gap: 12px;
      font-size: 0.85em;
    }

    .hud-stat-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .hud-stat-item label {
      font-size: 0.7em;
      color: #708090;
      text-transform: uppercase;
    }

    .hud-stat-item span {
      color: var(--ui-accent);
      font-weight: bold;
    }

    /* 底部统一控制面板 */
    #bottom-hud {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: env(safe-area-inset-bottom, 10px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-left: 15px;
      padding-right: 15px;
      z-index: 100;
      pointer-events: none;
    }

    #control-cluster {
      display: flex;
      gap: 10px;
      pointer-events: auto;
      background: var(--ui-bg);
      backdrop-filter: blur(12px);
      padding: 10px;
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--ui-border);
      border-bottom: none;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
    }

    .action-group {
      display: flex;
      gap: 8px;
    }

    .mbtn {
      width: 60px;
      height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(232, 200, 74, 0.4);
      color: var(--ui-accent);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mbtn:active {
      background: var(--ui-accent);
      color: #000;
      transform: scale(0.95);
    }

    .mbtn i {
      font-size: 18px;
      margin-bottom: 2px;
    }

    #mode-toggle {
      width: 50px;
      height: 50px;
      background: rgba(40, 60, 80, 0.4);
      border: 2px solid var(--ui-accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ui-accent);
      font-size: 20px;
      cursor: pointer;
    }

    #mode-toggle.active {
      background: var(--ui-accent);
      color: #000;
      box-shadow: 0 0 15px var(--ui-glow);
    }

    #info-panel {
      pointer-events: none;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 8px 12px;
      border-radius: 8px 8px 0 0;
      font-size: 0.7em;
      color: #90a0b0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: none;
    }

    #info-panel b {
      color: #fff;
      margin-right: 4px;
    }

    /* 模态窗口/结束画面 */
    .endscr {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      text-align: center;
      padding: 20px;
      background: rgba(5, 10, 15, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--ui-border);
    }

    .endscr.on {
      display: flex;
    }

    #ov {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 150;
      text-align: center;
      padding: 30px;
    }

    #ov.on {
      display: flex;
    }

    #ovtext {
      font-family: 'Noto Serif SC', serif;
      font-size: 1em;
      color: #c8d8b8;
      line-height: 2.3;
      max-width: 500px;
      animation: fi 1s ease;
    }

    #ovbig {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.2em;
      color: #ff3333;
      font-weight: 900;
      letter-spacing: .2em;
      text-shadow: 0 0 30px #ff3333;
      margin-top: 20px;
      display: none;
      animation: pu 0.8s infinite alternate;
    }

    #ovbtn {
      margin-top: 30px;
      padding: 12px 35px;
      background: var(--ui-accent);
      color: #000;
      border: none;
      font-family: var(--font-main);
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
      display: none;
      font-weight: bold;
      box-shadow: 0 0 20px var(--ui-glow);
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    @keyframes pu {
      from {
        text-shadow: 0 0 15px #ff3333
      }

      to {
        text-shadow: 0 0 40px #ff8888, 0 0 60px #ff3333
      }
    }

    #winscr h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8em;
      color: #40ff70;
      text-shadow: 0 0 30px #40ff70;
    }

    #winscr p {
      color: #80c090;
      margin-top: 10px;
      font-size: .85em;
    }

    #defscr h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8em;
      color: #ff4040;
    }

    #defscr p {
      color: #c07070;
      margin-top: 10px;
      font-size: .85em;
    }

    .rbtn {
      margin-top: 18px;
      padding: 9px 26px;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: .95em;
      cursor: pointer;
      border-radius: 2px;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .hud-title h1 {
        font-size: 0.9em;
      }

      .hud-stats {
        gap: 8px;
      }

      #info-panel {
        display: none;
      }
    }

    /* VR 按钮样式 */
    #vr-btn {
      position: absolute;
      top: 10px;
      right: 170px;
      z-index: 1000;
      padding: 10px 20px;
      background: #e8c84a;
      color: #000;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      display: none;
    }

    #vr-mode-select {
      position: absolute;
      top: 55px;
      right: 170px;
      z-index: 1000;
      display: none;
      color: #fff;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #e8c84a;
    }

    #vr-mode-select input {
      vertical-align: middle;
      margin-right: 5px;
    }

    #vr-btn:hover {
      background: #f0d87a;
    }
  </style>
  <script type="importmap">
    {

</head>

<body>

    <div id="vr-mode-select">

    <!-- 底部统一面板 -->
    <footer id="bottom-hud">
      <div id="info-panel">
        <b>图例</b> 我方🪖 敌方💂 长官🎖 船🚢 壕⬛ 火🔥

      <div id="control-cluster">

        <div class="action-group">

        </div>
      </div>
    </footer>
  </div>
